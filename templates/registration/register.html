{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4 p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Join BT DataPlug</h3>
                <p class="text-muted small">The fastest way to buy Data & Airtime</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">First Name</label>
                        <input type="text" name="first_name" class="form-control" placeholder="e.g. Aliyu" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Last Name</label>
                        <input type="text" name="last_name" class="form-control" placeholder="e.g. Musa" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a unique name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="yourname@email.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Create Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill">
                    Create Account & Get Bank No.
                </button>
                
                <div class="text-center mt-3">
                    <p class="small">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Login</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
