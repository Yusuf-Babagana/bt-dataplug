<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT DataPlug | Bilal Sada Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-blue: #004aad; --soft-bg: #f4f7fe; }
        body { background-color: var(--soft-bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Sidebar Styling */
        .sidebar { height: 100vh; width: 250px; position: fixed; background: white; border-right: 1px solid #e0e0e0; padding-top: 20px; }
        .nav-item-custom { padding: 12px 25px; display: block; color: #555; text-decoration: none; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item-custom:hover, .nav-item-custom.active { background: #f0f4ff; color: var(--primary-blue); border-left-color: var(--primary-blue); }
        
        .main-content { margin-left: 250px; padding: 20px; }
        .icon-box { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="text-center fw-bold text-primary mb-4">BT DataPlug</h4>
        <a href="#" class="nav-item-custom active"><i class="fa fa-home me-2"></i> Dashboard</a>
        <a href="#" class="nav-item-custom"><i class="fa fa-wallet me-2"></i> Fund Wallet</a>
        <a href="#" class="nav-item-custom"><i class="fa fa-history me-2"></i> Transactions</a>
        <a href="#" class="nav-item-custom text-danger"><i class="fa fa-sign-out me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <nav class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h5 class="mb-0 fw-bold">Welcome, {{ user.username }}</h5>
            <div class="d-flex align-items-center">
                <span class="badge bg-primary-subtle text-primary p-2">₦{{ user_wallet }}</span>
            </div>
        </nav>
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
