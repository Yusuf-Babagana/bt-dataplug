{% extends 'base.html' %}

{% block content %}
<div class="row g-4">
    <div class="col-md-4">
        <div class="p-4 balance-card shadow-sm">
            <small class="opacity-75">Reseller API Balance</small>
            <h1 class="fw-bold mt-2">₦{{ provider_balance }}</h1>
            <div class="mt-4">
                <span class="badge bg-white text-primary px-3 py-2">Verified Reseller</span>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="p-4 glass-card h-100">
            <h5 class="fw-bold mb-4">Quick Actions</h5>
            <div class="row g-3">
                <div class="col-6 col-sm-3 text-center">
                    <button class="btn btn-light w-100 py-3 shadow-sm border">
                        <div class="mb-2">📱</div>
                        <small class="fw-bold">Airtime</small>
                    </button>
                </div>
                <div class="col-6 col-sm-3 text-center">
                    <button class="btn btn-light w-100 py-3 shadow-sm border">
                        <div class="mb-2">🌐</div>
                        <small class="fw-bold">Data</small>
                    </button>
                </div>
                <div class="col-6 col-sm-3 text-center">
                    <button class="btn btn-light w-100 py-3 shadow-sm border">
                        <div class="mb-2">📺</div>
                        <small class="fw-bold">Cable TV</small>
                    </button>
                </div>
                <div class="col-6 col-sm-3 text-center">
                    <button class="btn btn-light w-100 py-3 shadow-sm border">
                        <div class="mb-2">💡</div>
                        <small class="fw-bold">Power</small>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="p-4 glass-card mt-2">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">Recent Transactions</h5>
                <a href="#" class="btn btn-sm btn-link text-decoration-none">View All</a>
            </div>
            <div class="table-responsive">
                <table class="table table-borderless align-middle">
                    <thead class="text-muted small">
                        <tr>
                            <th>Service</th>
                            <th>Recipient</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="fw-bold">MTN Data (1GB)</span></td>
                            <td>08012345678</td>
                            <td>₦250.00</td>
                            <td><span class="badge bg-success-subtle text-success border border-success">Success</span></td>
                        </tr>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
