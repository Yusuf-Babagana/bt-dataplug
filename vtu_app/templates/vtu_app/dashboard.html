{% extends 'base.html' %}

{% block content %}
<div class="row g-3">
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center p-3" onclick="location.href='#'" style="cursor: pointer;">
            <div class="icon-box bg-primary-subtle text-primary mx-auto">
                <i class="fa fa-wifi fa-lg"></i>
            </div>
            <p class="small fw-bold mb-0">Buy Data</p>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center p-3" style="cursor: pointer;">
            <div class="icon-box bg-success-subtle text-success mx-auto">
                <i class="fa fa-phone fa-lg"></i>
            </div>
            <p class="small fw-bold mb-0">Buy Airtime</p>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center p-3" style="cursor: pointer;">
            <div class="icon-box bg-warning-subtle text-warning mx-auto">
                <i class="fa fa-tv fa-lg"></i>
            </div>
            <p class="small fw-bold mb-0">Cable TV</p>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center p-3" style="cursor: pointer;">
            <div class="icon-box bg-danger-subtle text-danger mx-auto">
                <i class="fa fa-bolt fa-lg"></i>
            </div>
            <p class="small fw-bold mb-0">Electricity</p>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm mt-4 p-3">
    <h6 class="fw-bold">Referral Link</h6>
    <div class="input-group">
        <input type="text" class="form-control" value="https://bt-dataplug.com/ref/{{ user.id }}" readonly>
        <button class="btn btn-primary">Copy</button>
    </div>
</div>
{% endblock %}
