{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row g-3">
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center p-3" 
             data-bs-toggle="modal" 
             data-bs-target="#dataModal" 
             style="cursor: pointer; transition: 0.3s;"
             onmouseover="this.style.backgroundColor='#f0f4ff'" 
             onmouseout="this.style.backgroundColor='white'">
            <div class="icon-box bg-primary-subtle text-primary mx-auto">
                <i class="fa fa-wifi fa-lg"></i>
            </div>
            <p class="small fw-bold mb-0">Buy Data</p>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center p-3" style="cursor: pointer;">
            <div class="icon-box bg-success-subtle text-success mx-auto">
                <i class="fa fa-phone fa-lg"></i>
            </div>
            <p class="small fw-bold mb-0">Buy Airtime</p>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center p-3" style="cursor: pointer;">
            <div class="icon-box bg-warning-subtle text-warning mx-auto">
                <i class="fa fa-tv fa-lg"></i>
            </div>
            <p class="small fw-bold mb-0">Cable TV</p>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm text-center p-3" style="cursor: pointer;">
            <div class="icon-box bg-danger-subtle text-danger mx-auto">
                <i class="fa fa-bolt fa-lg"></i>
            </div>
            <p class="small fw-bold mb-0">Electricity</p>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm mt-4 p-3">
    <h6 class="fw-bold">Referral Link</h6>
    <div class="input-group">
        <input type="text" class="form-control" value="https://bt-dataplug.com/ref/{{ user.id }}" readonly>
        <button class="btn btn-primary">Copy</button>
    </div>
</div>

<div class="modal fade" id="dataModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card">
            <div class="modal-header border-0">
                <h5 class="fw-bold">Purchase Data Bundle</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form method="POST" action="{% url 'buy_data' %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-3 fw-bold">Buy Now</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const planData = {{ plan_data_json|safe }};
    const networkSelect = document.getElementById('id_network');
    const planSelect = document.getElementById('id_plan');

    networkSelect.addEventListener('change', (e) => {
        const selectedNetwork = e.target.value;
        planSelect.innerHTML = '<option value="">Select Plan</option>';
        
        if (planData[selectedNetwork]) {
            planData[selectedNetwork].forEach(plan => {
                const option = new Option(plan[1], plan[0]);
                planSelect.add(option);
            });
        }
    });
</script>

{% endblock %}
